apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-deployment
  labels:
    app: food
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food
  template:
    metadata:
      labels:
        app: food
    spec:
      containers:
      - name: food
        image: 133480914580.dkr.ecr.us-east-1.amazonaws.com/shopping-site-food:0d2296f06d99e6b0a3f539ec828239b4d3df884d
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: food-service
  labels:
    app: food
spec:
  type: ClusterIP
  selector:
    app: food
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
